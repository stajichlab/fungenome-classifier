[workspace]
authors = ["Jason Stajich <jasonstajich.phd@gmail.com>"]
channels = ["conda-forge", "bioconda", "main", "r", "msys2"]
name = "fungal-classifier"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
numpy = ">=1.26"
pandas = ">=2.1"
scipy = ">=1.11"
scikit-learn = ">=1.4"
xgboost = ">=2.0"
lightgbm = ">=4.0"
shap = ">=0.44"
ete3 = ">=3.1"
dendropy = ">=4.6"
biopython = ">=1.81"
h5py = ">=3.10"
pyarrow = ">=14.0"
pyyaml = ">=6.0"
tqdm = ">=4.66"
joblib = ">=1.3"
matplotlib = ">=3.8"
seaborn = ">=0.13"
plotly = ">=5.18"
jupyter = "*"
pytest = ">=7.4"
black = "*"
ruff = "*"
umap-learn = "*"
prince = "*"
imbalanced-learn = "*"
pytorch-gpu = "*"
torchvision = "*"
pip = "*"

[system-requirements]
cuda = "12.8"
