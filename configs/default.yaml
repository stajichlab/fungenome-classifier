# configs/default.yaml
# Default experiment configuration for FungalClassifier

# ── Feature blocks ─────────────────────────────────────────────────────────────
features:
  kmer:
    enabled: true
    k_values: [1, 2, 3, 4, 5, 6]
    normalize: relative_abundance   # options: count | relative_abundance | obs_exp
    sequence_type: genomic          # options: genomic | cds | both
    window_size: null               # null = whole sequence

  domains:
    enabled: true
    database: pfam                  # options: pfam | interpro | both
    representation: copy_number     # options: binary | copy_number
    min_genome_freq: 0.01           # drop domains present in < 1% of genomes

  pathways:
    enabled: true
    kegg: true
    go:
      enabled: true
      aggregation: slim             # options: full | slim | level2
    cazyme: true                    # requires dbCAN output
    bgc: true                       # requires antiSMASH output
    min_genome_freq: 0.01

  repeats:
    enabled: true
    normalize_by: genome_size       # options: genome_size | none
    classes:                        # RepeatMasker classes to extract
      - LTR
      - DNA
      - LINE
      - SINE
      - Simple_repeat
      - Low_complexity
      - Unknown

  motifs:
    enabled: true
    pwm_database: jaspar_fungi      # options: jaspar_fungi | jaspar_all | custom
    p_value_threshold: 1.0e-4
    upstream_bp: 1000               # promoter window upstream of TSS

  subcellular:
    enabled: true                   # TMHMM, SignalP, WolfPSORT, TargetP combined

  disorder:
    enabled: true                   # AIUPred intrinsic disorder scores
    threshold: 0.5                  # residue disorder score cutoff
    idr_min_length: 10              # min consecutive disordered residues for long IDR

  proteases:
    enabled: true                   # MEROPS BLAST results
    min_identity: 30.0              # minimum BLAST % identity
    min_align_len: 50               # minimum alignment length (aa)
    max_evalue: 1.0e-5
    min_genome_freq: 0.01

  genomic:
    enabled: true                   # genome length, N50, scaffold count, GC, protein length stats
    # Genome assembly FASTAs are read from --genome-dir (same as k-mer block)
    # Protein FASTAs are looked up in --annotation-dir/proteins/ (.faa/.pep/.aa)

  introns:
    enabled: true                   # intron lengths, counts, splice sites, PPT score
    # GFF3 files: --annotation-dir/gff/{genome_id}.gff3[.gz]
    # Genome FASTAs: matched from --genome-dir by genome_id (enables splice site features)
    feature_types: [exon]           # GFF3 feature type(s) to use as exon anchors; falls back to CDS
    ppt_window: 20                  # bp upstream of 3' acceptor for polypyrimidine tract scoring

  composition:
    enabled: true                   # codon usage, AA frequency, gene count
    # Source preference: codon_freq_csv > cds_fasta > protein_fasta
    # Files expected in annotations/cds/:
    #   {genome_id}.cds-transcripts.codon_freq.csv  (pre-computed)
    #   {genome_id}.cds-transcripts.fa[.gz]          (raw CDS FASTA)

# ── Feature selection ──────────────────────────────────────────────────────────
feature_selection:
  method: variance_threshold        # applied per block before fusion
  variance_threshold: 0.01
  univariate_k: 500                 # top-k features per block (null = keep all)
  univariate_scoring: f_classif     # options: f_classif | mutual_info_classif

# ── Models ─────────────────────────────────────────────────────────────────────
models:
  block_classifier:
    type: xgboost                   # options: xgboost | lightgbm | random_forest
    xgboost:
      n_estimators: 500
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      use_label_encoder: false
      eval_metric: mlogloss
      early_stopping_rounds: 50

  fusion:
    strategy: stacking              # options: concat | stacking | attention
    meta_learner: logistic_regression
    use_probabilities: true         # use block prediction probabilities as meta-features

# ── Targets ────────────────────────────────────────────────────────────────────
targets:
  - name: taxonomy_order
    column: taxonomy_order
    task: multiclass
  - name: ecological_niche
    column: ecological_niche
    task: multiclass
  - name: lifestyle
    column: lifestyle
    task: multiclass

# ── Cross-validation ───────────────────────────────────────────────────────────
cross_validation:
  strategy: clade_holdout           # options: clade_holdout | random | stratified
  n_folds: 10
  clade_level: order                # phylogenetic level to hold out (family | order | class)
  random_seed: 42
  phylo_correction: phylo_eigenvectors  # options: none | phylo_eigenvectors | pgls

# ── Preprocessing ──────────────────────────────────────────────────────────────
preprocessing:
  scaler: standard                  # options: standard | minmax | robust | none
  handle_sparse: truncated_svd      # options: truncated_svd | none
  svd_components: 200
  impute_missing: median            # options: median | zero | none

# ── Output ─────────────────────────────────────────────────────────────────────
output:
  save_feature_matrices: true
  save_shap_values: true
  plot_format: svg
  log_level: INFO
